{% if google_analytics_measurement_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ google_analytics_measurement_id | e }}"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ google_analytics_measurement_id | e }}');
</script>
{% endif %}
